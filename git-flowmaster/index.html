<!-- made by AI (Google Gemini Canvas) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Flow Master</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map to tell the browser where to find React and Lucide -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
        }
    }
    </script>
</head>
<body class="bg-slate-900 text-slate-200">
    <div id="root"></div>

    <!-- The React Code -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          GitCommit, 
          GitPullRequest, 
          UploadCloud, 
          DownloadCloud, 
          Play, 
          Check, 
          AlertTriangle, 
          FileCode, 
          Server, 
          Laptop, 
          Plus, 
          ArrowRight,
          RefreshCw,
          ShieldAlert
        } from 'lucide-react';

        // --- Components ---

        const Button = ({ onClick, disabled, children, className = "", variant = "primary" }) => {
          const baseStyle = "px-4 py-2 rounded font-bold transition-all duration-200 flex items-center gap-2 shadow-sm";
          const variants = {
            primary: "bg-blue-600 hover:bg-blue-700 text-white disabled:bg-gray-300 disabled:text-gray-500",
            success: "bg-green-600 hover:bg-green-700 text-white disabled:bg-gray-300 disabled:text-gray-500",
            danger: "bg-red-500 hover:bg-red-600 text-white disabled:bg-gray-300 disabled:text-gray-500",
            neutral: "bg-gray-200 hover:bg-gray-300 text-gray-800 disabled:opacity-50",
            warning: "bg-amber-500 hover:bg-amber-600 text-white disabled:opacity-50"
          };

          return (
            <button 
              onClick={onClick} 
              disabled={disabled} 
              className={`${baseStyle} ${variants[variant]} ${className}`}
            >
              {children}
            </button>
          );
        };

        const CodeLine = ({ content, lineNum, status, isConflict, onResolve }) => {
          let bgClass = "bg-gray-50";
          if (status === 'added') bgClass = "bg-green-100 border-l-4 border-green-500";
          if (status === 'modified') bgClass = "bg-yellow-50 border-l-4 border-yellow-400";
          if (status === 'conflict') bgClass = "bg-red-50 border-l-4 border-red-500";

          return (
            <div className={`p-2 mb-1 font-mono text-sm rounded ${bgClass} flex justify-between items-center`}>
              <span className="text-gray-400 select-none w-6 mr-2">{lineNum}</span>
              <span className="flex-grow truncate">{content}</span>
              {isConflict && (
                <div className="flex gap-2">
                  <button onClick={() => onResolve('local')} className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded hover:bg-blue-200">Keep Local</button>
                  <button onClick={() => onResolve('remote')} className="text-xs bg-purple-100 text-purple-700 px-2 py-1 rounded hover:bg-purple-200">Keep Remote</button>
                </div>
              )}
            </div>
          );
        };

        // --- Game Logic & Main Component ---

        function GitFlowMaster() {
          // Game State
          const [level, setLevel] = useState(1);
          const [logs, setLogs] = useState([]);
          const [feedback, setFeedback] = useState("Welcome! Let's ship some code.");
          const [completedLevels, setCompletedLevels] = useState([]);

          // Git State
          const [localCode, setLocalCode] = useState(["console.log('App Start');", "", ""]);
          const [remoteCode, setRemoteCode] = useState(["console.log('App Start');", "", ""]);
          
          // "Files"
          const [workDir, setWorkDir] = useState([...localCode]); // Working Directory
          const [staging, setStaging] = useState(null); // Staging Area
          const [localRepo, setLocalRepo] = useState([...localCode]); // Local Repository (Committed)
          
          // Commit History IDs (simplified for simulation)
          const [localCommitId, setLocalCommitId] = useState(1);
          const [remoteCommitId, setRemoteCommitId] = useState(1);
          const [remoteAhead, setRemoteAhead] = useState(false); // Does remote have changes we don't?

          // Conflict State
          const [conflictMode, setConflictMode] = useState(false);
          const [conflictData, setConflictData] = useState(null);

          // Helper: Logger
          const log = (msg, type = 'info') => {
            setLogs(prev => [{ id: Date.now(), msg, type }, ...prev]);
          };

          // Helper: Reset Level
          const resetLevel = (lvl) => {
            setLocalCode(["console.log('App Start');", "", ""]);
            setRemoteCode(["console.log('App Start');", "", ""]);
            setWorkDir(["console.log('App Start');", "", ""]);
            setLocalRepo(["console.log('App Start');", "", ""]);
            setStaging(null);
            setLocalCommitId(1);
            setRemoteCommitId(1);
            setRemoteAhead(false);
            setConflictMode(false);
            setConflictData(null);
            setLogs([]);
            
            // Level specific setups
            if (lvl === 1) {
              setFeedback("Level 1: The Basics. Edit code, Add, Commit, then Push.");
            } else if (lvl === 2) {
              setFeedback("Level 2: The Remote Update. Someone edited the code on GitHub (or you used the pencil icon). You need to sync.");
            } else if (lvl === 3) {
              setFeedback("Level 3: Auto-Merge. You and a teammate edited DIFFERENT lines. Git is smart enough to combine them.");
            } else if (lvl === 4) {
              setFeedback("Level 4: Merge Conflict. You both edited the SAME line. You must choose which version to keep.");
            }
          };

          useEffect(() => {
            resetLevel(level);
          }, [level]);

          // --- Actions ---

          const handleEdit = (lineIndex, newText) => {
            const newWorkDir = [...workDir];
            newWorkDir[lineIndex] = newText;
            setWorkDir(newWorkDir);
            log(`Modified line ${lineIndex + 1} in working directory.`, 'action');
          };

          const handleStage = () => {
            // Check if there are changes
            const hasChanges = JSON.stringify(workDir) !== JSON.stringify(localRepo);
            if (!hasChanges && !conflictMode) {
              setFeedback("⚠️ No changes to add! Edit the code first.");
              return;
            }
            setStaging([...workDir]);
            log("git add .", 'command');
            setFeedback("Files staged! Ready to commit.");
          };

          const handleCommit = () => {
            if (!staging) {
              setFeedback("⚠️ Nothing to commit! You must 'git add' first.");
              return;
            }
            setLocalRepo([...staging]);
            setStaging(null);
            setLocalCommitId(prev => prev + 1);
            log('git commit -m "Update code"', 'command');
            setFeedback("Changes committed locally. Time to push?");
            
            // If in conflict mode and we just committed, we resolved it
            if (conflictMode) {
              setConflictMode(false);
              setConflictData(null);
              setFeedback("Conflict resolved and committed! Now you can push.");
            }
          };

          const handlePush = () => {
            if (remoteAhead) {
              setFeedback("🚫 REJECTED! Remote has changes you don't have. You must PULL first.");
              log("! [rejected] error: failed to push some refs", 'error');
              return;
            }

            if (localCommitId === remoteCommitId) {
              setFeedback("Everything is up to date.");
              return;
            }

            // Success Push
            setRemoteCode([...localRepo]);
            setRemoteCommitId(localCommitId);
            log("git push origin main", 'command');
            
            // Level Completion Check
            if (level === 1 && localCommitId > 1) passLevel();
            if (level === 2 && remoteAhead === false && localCommitId > remoteCommitId) passLevel(); // Logic flaw fix: pushing after pull updates IDs
            if (level === 3 && !remoteAhead) passLevel();
            if (level === 4 && !remoteAhead && !conflictMode) passLevel();
            
            setFeedback("✅ Success! Code pushed to GitHub.");
          };

          const handlePull = () => {
            log("git pull origin main", 'command');
            
            if (!remoteAhead) {
              setFeedback("Already up to date.");
              return;
            }

            // SCENARIO: Level 2 (Simple Fast-forward/Update)
            if (level === 2) {
              setWorkDir([...remoteCode]);
              setLocalRepo([...remoteCode]);
              setLocalCommitId(remoteCommitId);
              setRemoteAhead(false);
              setFeedback("Synced! You have the latest code.");
              setTimeout(passLevel, 1000);
              return;
            }

            // Check for conflicts
            const localChanges = JSON.stringify(localRepo) !== JSON.stringify(remoteCode);
            
            if (localChanges) {
              // Compare lines
              let newCode = [...localRepo];
              let hasConflict = false;
              let conflictInfo = null;

              // Simple 3-line logic
              for(let i=0; i<3; i++) {
                const localLine = localRepo[i];
                const remoteLine = remoteCode[i];
                
                // Base content (hardcoded for this simple game context to detect changes from base)
                const baseLine = (i === 0) ? "console.log('App Start');" : ""; 
                
                const localChanged = localLine !== baseLine;
                const remoteChanged = remoteLine !== baseLine;

                if (localChanged && remoteChanged && localLine !== remoteLine) {
                  hasConflict = true;
                  conflictInfo = { lineIndex: i, local: localLine, remote: remoteLine };
                } else if (remoteChanged) {
                  // Auto merge
                  newCode[i] = remoteLine;
                }
              }

              if (hasConflict) {
                setConflictMode(true);
                setConflictData(conflictInfo);
                setRemoteAhead(false); // Technically we fetched, now we merge
                // Update IDs to match remote so we can push after resolve
                setRemoteCommitId(prev => prev); 
                setFeedback("💥 MERGE CONFLICT! Both of you edited the same line. Resolve it in the editor.");
              } else {
                // Auto Merge Success
                setWorkDir(newCode);
                setLocalRepo(newCode); // Simplified: Pull usually merges into working dir, assume clean auto-commit for game simplicity or ask to commit
                setFeedback("✨ Auto-merged successfully! Different lines were edited.");
                setRemoteAhead(false);
                // In real git, pull does a fetch + merge. 
                // We will say the user now needs to push their combined work if they had local commits.
              }
            } else {
              // No local changes, just update
              setWorkDir([...remoteCode]);
              setLocalRepo([...remoteCode]);
              setRemoteAhead(false);
            }
          };

          const resolveConflict = (choice) => {
            if (!conflictData) return;
            const newWorkDir = [...workDir];
            newWorkDir[conflictData.lineIndex] = choice === 'local' ? conflictData.local : conflictData.remote;
            setWorkDir(newWorkDir);
            setConflictData(null); // Visual conflict gone, but still in conflict mode until commit
            setFeedback("Conflict resolved in file. Now Add and Commit the resolution.");
          };

          const passLevel = () => {
            setFeedback("🎉 LEVEL COMPLETE! Moving to next challenge...");
            if (!completedLevels.includes(level)) {
              setCompletedLevels([...completedLevels, level]);
            }
            setTimeout(() => {
              if (level < 4) setLevel(l => l + 1);
            }, 2000);
          };

          // --- Scenario Triggers ---

          const triggerRemoteChange = () => {
            if (level === 2) {
              setRemoteCode(["console.log('App Start');", "const user = 'Teammate';", ""]);
              setRemoteCommitId(99); // Advance remote
              setRemoteAhead(true);
              setFeedback("👀 A wild teammate appeared! They pushed code to GitHub.");
              log("Remote repository updated by another user.", 'warning');
            }
            if (level === 3) {
              // Remote changes line 2
              setRemoteCode(["console.log('App Start');", "initDatabase();", ""]);
              setRemoteCommitId(99);
              setRemoteAhead(true);
              setFeedback("Teammate updated Line 2. You should edit Line 3, then try to push.");
              log("Remote repository updated.", 'warning');
            }
            if (level === 4) {
              // Remote changes line 2
              setRemoteCode(["console.log('App Start');", "const color = 'BLUE';", ""]);
              setRemoteCommitId(99);
              setRemoteAhead(true);
              setFeedback("Teammate set Line 2 to 'BLUE'. You should set Line 2 to 'RED', then try to push.");
              log("Remote repository updated.", 'warning');
            }
          };

          // --- Render Helpers ---

          const getLineStatus = (index, content) => {
            // Compare WorkDir to LocalRepo (Staging Logic)
            if (staging) {
               if (staging[index] !== localRepo[index]) return 'added';
            }
            if (content !== localRepo[index] && !staging) return 'modified';
            if (conflictMode && conflictData && conflictData.lineIndex === index) return 'conflict';
            return 'clean';
          };

          return (
            <div className="min-h-screen bg-slate-900 text-slate-200 font-sans p-4 flex flex-col items-center">
              
              {/* Header */}
              <header className="w-full max-w-6xl mb-6 flex justify-between items-center border-b border-slate-700 pb-4">
                <div>
                  <h1 className="text-3xl font-bold text-blue-400 flex items-center gap-2">
                    <GitPullRequest /> Git Flow Master
                  </h1>
                  <p className="text-slate-400">Understand the Push & Pull lifecycle</p>
                </div>
                <div className="flex gap-2">
                  {[1, 2, 3, 4].map(l => (
                    <button 
                      key={l}
                      onClick={() => setLevel(l)}
                      className={`w-10 h-10 rounded-full font-bold flex items-center justify-center transition-all
                        ${level === l ? 'bg-blue-500 text-white ring-4 ring-blue-500/30' : 
                          completedLevels.includes(l) ? 'bg-green-600 text-white' : 'bg-slate-700 text-slate-400'}`}
                    >
                      {completedLevels.includes(l) ? <Check size={16} /> : l}
                    </button>
                  ))}
                </div>
              </header>

              {/* Main Game Area */}
              <main className="w-full max-w-6xl grid grid-cols-1 md:grid-cols-12 gap-6 flex-grow">
                
                {/* LEFT: Local Environment */}
                <div className="md:col-span-5 flex flex-col gap-4">
                  <div className="bg-slate-800 rounded-lg p-4 border-2 border-slate-700 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-1 bg-blue-500"></div>
                    <div className="flex justify-between items-center mb-4">
                      <h2 className="text-xl font-bold flex items-center gap-2"><Laptop size={20}/> My Computer (Local)</h2>
                      <div className="text-xs font-mono bg-slate-900 px-2 py-1 rounded">HEAD: {localCommitId.toString(16)}</div>
                    </div>

                    {/* Editor */}
                    <div className="bg-white rounded text-slate-800 p-4 shadow-inner min-h-[200px]">
                      <div className="flex justify-between text-xs text-gray-400 mb-2 uppercase font-bold tracking-wider">
                        <span>FILE: script.js</span>
                        <span>{conflictMode ? "MERGING" : (staging ? "STAGED" : "WORKING")}</span>
                      </div>
                      
                      {workDir.map((line, i) => (
                        <CodeLine 
                          key={i} 
                          lineNum={i+1} 
                          content={line} 
                          status={getLineStatus(i, line)}
                          isConflict={conflictMode && conflictData?.lineIndex === i}
                          onResolve={resolveConflict}
                        />
                      ))}

                      {/* Simulation Controls for editing */}
                      {!conflictMode && (
                         <div className="mt-4 pt-4 border-t border-gray-200 grid grid-cols-2 gap-2">
                          <p className="col-span-2 text-xs text-gray-500 text-center mb-1">-- Simulation Actions --</p>
                          {level === 1 && (
                             <button onClick={() => handleEdit(1, "console.log('Hello World');")} className="text-xs bg-blue-100 text-blue-800 py-1 px-2 rounded hover:bg-blue-200">
                               Edit Line 2
                             </button>
                          )}
                          {level === 3 && (
                             <button onClick={() => handleEdit(2, "initAnalytics();")} className="text-xs bg-blue-100 text-blue-800 py-1 px-2 rounded hover:bg-blue-200">
                               Edit Line 3
                             </button>
                          )}
                          {level === 4 && (
                             <button onClick={() => handleEdit(1, "const color = 'RED';")} className="text-xs bg-red-100 text-red-800 py-1 px-2 rounded hover:bg-red-200">
                               Set Line 2 to 'RED'
                             </button>
                          )}
                          <button onClick={() => setWorkDir([...localRepo])} className="text-xs bg-gray-100 text-gray-800 py-1 px-2 rounded hover:bg-gray-200">
                             Discard Changes
                           </button>
                         </div>
                      )}
                    </div>

                    {/* Local Git Actions */}
                    <div className="mt-4 flex flex-wrap gap-2 justify-center">
                      <Button onClick={handleStage} variant={staging ? "success" : "neutral"} disabled={staging || conflictMode}>
                         <Plus size={16} /> Git Add
                      </Button>
                      <Button onClick={handleCommit} variant={staging || (conflictMode && !conflictData) ? "primary" : "neutral"} disabled={!staging && !(conflictMode && !conflictData)}>
                         <GitCommit size={16} /> Git Commit
                      </Button>
                    </div>
                    
                    {/* Staging Visualizer */}
                    <div className="mt-2 text-center h-6">
                       {staging ? 
                         <span className="text-green-400 text-sm flex items-center justify-center gap-1"><Check size={14}/> Changes Staged</span> : 
                         <span className="text-slate-500 text-sm">Working directory clean (or unstaged)</span>
                       }
                    </div>
                  </div>
                </div>

                {/* CENTER: The Network/Flow */}
                <div className="md:col-span-2 flex flex-col justify-center items-center gap-8 relative">
                   {/* Connection Lines (Visual only) */}
                   <div className="absolute inset-0 flex justify-center items-center -z-10 opacity-20 pointer-events-none">
                     <div className="w-1 h-full bg-gradient-to-b from-transparent via-slate-500 to-transparent"></div>
                   </div>

                   {/* Push Button */}
                   <div className="relative group">
                     <Button onClick={handlePush} className="w-32 justify-center" variant="warning">
                       Push <ArrowRight size={16} />
                     </Button>
                     <div className="absolute top-full mt-2 w-32 text-center text-xs text-slate-400 hidden group-hover:block">
                       Uploads local commits to remote
                     </div>
                   </div>

                   {/* Status Indicator */}
                   <div className={`p-2 rounded-full border-2 ${remoteAhead ? 'bg-red-900 border-red-500 animate-pulse' : 'bg-slate-800 border-slate-600'}`}>
                     {remoteAhead ? <ShieldAlert className="text-red-500"/> : <Check className="text-green-500"/>}
                   </div>

                   {/* Pull Button */}
                   <div className="relative group">
                     <Button onClick={handlePull} className="w-32 justify-center flex-row-reverse" variant="neutral">
                       <ArrowRight className="rotate-180" size={16} /> Pull
                     </Button>
                     <div className="absolute bottom-full mb-2 w-32 text-center text-xs text-slate-400 hidden group-hover:block">
                       Downloads remote changes to local
                     </div>
                   </div>
                </div>

                {/* RIGHT: Remote Repository */}
                <div className="md:col-span-5 flex flex-col gap-4">
                  <div className="bg-slate-800 rounded-lg p-4 border-2 border-slate-700 relative">
                     <div className="absolute top-0 left-0 w-full h-1 bg-purple-500"></div>
                     <div className="flex justify-between items-center mb-4">
                      <h2 className="text-xl font-bold flex items-center gap-2"><Server size={20}/> GitHub (Remote)</h2>
                      <div className="text-xs font-mono bg-slate-900 px-2 py-1 rounded">HEAD: {remoteCommitId.toString(16)}</div>
                    </div>

                    <div className="bg-slate-900 rounded border border-slate-700 p-4 font-mono text-sm min-h-[200px]">
                       {remoteCode.map((line, i) => (
                         <div key={i} className="mb-1 text-slate-300 flex">
                           <span className="text-slate-600 w-6 mr-2 select-none">{i+1}</span>
                           {line}
                         </div>
                       ))}
                    </div>

                    {/* Simulating Teammate Actions */}
                    <div className="mt-4 border-t border-slate-700 pt-4 text-center">
                      {(level === 2 || level === 3 || level === 4) && !remoteAhead && remoteCommitId <= localCommitId && (
                        <button 
                          onClick={triggerRemoteChange}
                          className="text-xs bg-purple-900 text-purple-200 px-3 py-2 rounded hover:bg-purple-800 border border-purple-700 flex items-center justify-center gap-2 w-full"
                        >
                          <RefreshCw size={12} />
                          {level === 2 ? "Simulate Teammate Push / Pencil Edit" : "Simulate Teammate Changes"}
                        </button>
                      )}
                       {remoteAhead && (
                         <div className="text-red-400 text-sm flex items-center justify-center gap-2 animate-pulse">
                           <AlertTriangle size={16}/> Remote is ahead! (Pull required)
                         </div>
                       )}
                    </div>
                  </div>
                </div>

              </main>

              {/* Footer: Console & Instructions */}
              <footer className="w-full max-w-6xl mt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                
                {/* Feedback / Instructions */}
                <div className="bg-blue-900/30 border border-blue-500/30 p-4 rounded-lg">
                  <h3 className="text-blue-400 font-bold mb-2 flex items-center gap-2"><Play size={16}/> Current Objective</h3>
                  <p className="text-lg text-white">{feedback}</p>
                  <div className="mt-4 text-sm text-slate-400">
                    <p className="font-bold text-slate-300 mb-1">Key Concepts:</p>
                    <ul className="list-disc list-inside space-y-1">
                      <li><strong>Add</strong>: Move changes to Staging.</li>
                      <li><strong>Commit</strong>: Save Staged changes to Local Repo.</li>
                      <li><strong>Push</strong>: Send Local Repo changes to Remote.</li>
                      <li><strong>Pull</strong>: Fetch Remote changes and merge to Local.</li>
                    </ul>
                  </div>
                </div>

                {/* Terminal/Log */}
                <div className="bg-black rounded-lg p-4 font-mono text-sm h-48 overflow-y-auto border border-slate-700 shadow-inner custom-scrollbar">
                  <div className="text-slate-500 mb-2">--- Git Terminal ---</div>
                  {logs.length === 0 && <div className="text-slate-700">Waiting for commands...</div>}
                  {logs.map((log) => (
                    <div key={log.id} className={`mb-1 ${
                      log.type === 'command' ? 'text-green-400' : 
                      log.type === 'error' ? 'text-red-500' : 
                      log.type === 'warning' ? 'text-yellow-400' : 
                      log.type === 'action' ? 'text-blue-300' : 'text-slate-300'
                    }`}>
                      <span className="opacity-50 mr-2">$</span>
                      {log.msg}
                    </div>
                  ))}
                </div>

              </footer>

              <style>{`
                .custom-scrollbar::-webkit-scrollbar {
                  width: 8px;
                }
                .custom-scrollbar::-webkit-scrollbar-track {
                  background: #1e293b; 
                }
                .custom-scrollbar::-webkit-scrollbar-thumb {
                  background: #475569; 
                  border-radius: 4px;
                }
                .custom-scrollbar::-webkit-scrollbar-thumb:hover {
                  background: #64748b; 
                }
              `}</style>
            </div>
          );
        }

        // --- Mount Application ---
        const root = createRoot(document.getElementById('root'));
        root.render(<GitFlowMaster />);
    </script>
</body>
</html>
